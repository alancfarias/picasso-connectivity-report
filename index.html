      --ok-bg: #dff5e5;
      --ok: #166534;
      --fail-bg: #fde2e2;
      --fail: #991b1b;
      --inconclusive-bg: #fff7d6;
      --inconclusive: #854d0e;
      --pending-bg: #eceff5;
      --pending: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }

    header {
      padding: 18px 22px;
      background: var(--head);
      color: #fff;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 650;
    }

    header p {
      margin: 0;
      color: #d1d5db;
    }

    main {
      padding: 18px 22px 28px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      margin-bottom: 14px;
      padding: 12px;
      background: #fff;
      border: 1px solid var(--line);
    }

    label {
      display: grid;
      gap: 4px;
      min-width: 190px;
      font-weight: 650;
      color: #253044;
    }

    select,
    input {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 5px 8px;
      font: inherit;
      font-weight: 400;
      color: var(--ink);
      background: #fff;
    }

    .count {
      color: var(--muted);
      margin-left: auto;
      padding-bottom: 7px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--line);
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 9px 10px;
      vertical-align: top;
    }

    th {
      background: var(--head);
      color: #fff;
      text-align: left;
      font-weight: 650;
      white-space: nowrap;
      padding: 0;
    }

    th button {
      width: 100%;
      height: 100%;
      min-height: 39px;
      border: 0;
      padding: 9px 10px;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    th button.sorted {
      background: #243044;
      box-shadow: inset 0 -3px 0 #60a5fa;
    }

    th button:hover,
    th button:focus {
      background: #1f2937;
      outline: none;
    }

    .sort-indicator {
      display: inline-block;
      min-width: 16px;
      color: #bfdbfe;
      margin-left: 6px;
      font-size: 12px;
    }

    td.group {
      font-weight: 650;
      width: 145px;
    }

    td.domain {
      width: 225px;
      word-break: break-word;
    }

    td.endpoint {
      width: 330px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      word-break: break-word;
    }

    td.integration {
      width: 210px;
      font-weight: 620;
      font-size: 15px;
      color: #0f172a;
      background: #f8fafc;
    }

    td.direction {
      width: 90px;
      white-space: nowrap;
    }

    td.refs {
      width: 170px;
      font-size: 13px;
    }

    td.resources {
      width: 230px;
      font-size: 13px;
    }

    .muted {
      color: var(--muted);
    }

    .pill {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 999px;
      font-weight: 650;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    .ok { background: var(--ok-bg); color: var(--ok); }
    .fail { background: var(--fail-bg); color: var(--fail); }
    .inconclusive { background: var(--inconclusive-bg); color: var(--inconclusive); }
    .pending { background: var(--pending-bg); color: var(--pending); }

    tbody tr.status-ok td:not([rowspan]) { background: #f0fbf3; }
    tbody tr.status-fail td:not([rowspan]) { background: #fff0f0; }
    tbody tr.status-inconclusive td:not([rowspan]) { background: #fffaf0; }
    tbody tr.status-pending td:not([rowspan]) { background: #f6f8fb; }
    tbody tr.status-ok td.integration { background: #e8f8ee; }
    tbody tr.status-fail td.integration { background: #fde8e8; }
    tbody tr.status-inconclusive td.integration { background: #fff3c4; }
    tbody tr.status-pending td.integration { background: #eef2f7; }

    code {
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      background: #f1f5f9;
      padding: 1px 4px;
      border-radius: 4px;
    }

    a { color: #0645d8; }
  </style>
</head>

        resourcesSort: "Custom Connector Mobilidade numero OT fake controlado",

        state: "<span class=\"pill fail\">Falha 404</span><br><code>No resources match requested URI</code>."
      },
      {
        group: "API E-REDES",
        domain: "https://api.e-redes.pt/e-redes/internal",
        domainSort: "https://api.e-redes.pt/e-redes/internal",
        endpoint: "/v2/grid-infrastructure/public-lighting-location",
        integration: "PIP / public-lighting-location / getPips",
        direction: "outbound",
        directionSort: "Outbound",
        refs: "PIP",
        refsSort: "PIP",
        path: "Custom Connector",
        pathSort: "Custom Connector",
        resources: "Custom Connector JUMP/PIP; operation <code>getPips</code>; coordenadas, raio e limite baixo.",
        resourcesSort: "Custom Connector JUMP PIP getPips coordenadas raio limite baixo",
        status: "pending",
        stateSort: "Nao testado",
        state: "<span class=\"pill pending\">Não testado neste ciclo</span>"
      },
      {
        group: "Gateway EDP",
        domain: "https://gateway.corp.edp.com",
        domainSort: "https://gateway.corp.edp.com",
        endpoint: "/customermanagement/ccenter/flow/v1?operation=triggerflowinteraction&amp;flowid=&lt;flowId PRD&gt;",
        integration: "TalkDesk outbound",
        direction: "outbound",
        directionSort: "Outbound",
        refs: "<a href=\"https://agile.corp.edp.pt/browse/INT-9285\">INT-9285</a><br><a href=\"https://agile.corp.edp.pt/browse/PCSS-705\">PCSS-705</a>",
        refsSort: "INT-9285 PCSS-705",
        path: "Custom Connector",
        pathSort: "Custom Connector",
        resources: "Custom Connector TalkDesk; números fake; <code>flowId</code> PRD.",
        resourcesSort: "Custom Connector TalkDesk numeros fake flowId PRD",
        status: "fail",
        stateSort: "Falha 401",
        state: "<span class=\"pill fail\">Falha 401</span><br><code>Request Rejected: Invalid Credentials</code>. Falta confirmar <code>flowId</code> e credenciais PRD."
      },
      {
        group: "Intent Designer",
        domain: "https://designer-interoperability-openprojectcontext.com",
        domainSort: "https://designer-interoperability-openprojectcontext.com",
        endpoint: "Base deeplink",
        integration: "Designer deeplink / Open Project Context",
        direction: "na",
        directionSort: "N/A",
        refs: "Config PRD",
        refsSort: "Config PRD",
        path: "Configuração",
        pathSort: "Configuracao",
        resources: "Environment variable / setting <code>designer_deeplink_base</code>.",
        resourcesSort: "Environment variable setting designer_deeplink_base",
        status: "pending",
        stateSort: "Não testado",
        state: "<span class=\"pill pending\">Não testado</span>"
      },
    ];

    const tbody = document.getElementById("connectivityRows");
    const groupFilter = document.getElementById("groupFilter");
    const integrationFilter = document.getElementById("integrationFilter");
    const statusFilter = document.getElementById("statusFilter");
    const directionFilter = document.getElementById("directionFilter");
    const rowCount = document.getElementById("rowCount");
    const sortButtons = Array.from(document.querySelectorAll("[data-sort]"));
    let sortState = { key: "group", direction: "asc" };

    function normalize(value) {
      return String(value ?? "")
        .replace(/<[^>]+>/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .toLocaleLowerCase("pt-PT");
    }

    function statusLabel(status) {
      if (status === "ok") return "Testado / sucesso";
      if (status === "fail") return "Falha";
      if (status === "inconclusive") return "Inconclusivo";
      return "A testar / pendente";
    }

    function directionLabel(direction) {
      if (direction === "outbound") return "Outbound";
      if (direction === "inbound") return "Inbound";
      return "N/A";
    }

    function populateFilters() {
      [...new Set(rows.map(row => row.group))]
        .sort((a, b) => a.localeCompare(b, "pt-PT"))
        .forEach(group => {
          const option = document.createElement("option");
          option.value = group;
          option.textContent = group;
          groupFilter.appendChild(option);
        });
    }

    function filteredRows() {
      const group = groupFilter.value;
      const integration = normalize(integrationFilter.value);
      const status = statusFilter.value;
      const direction = directionFilter.value;

      return rows.filter(row => {
        const groupMatch = !group || row.group === group;
        const integrationMatch = !integration || normalize(row.integration).includes(integration);
        const statusMatch = !status || row.status === status;
        const directionMatch = !direction || row.direction === direction;
        return groupMatch && integrationMatch && statusMatch && directionMatch;
      });
    }

    function sortedRows(data) {
      const { key, direction } = sortState;
      const multiplier = direction === "asc" ? 1 : -1;

      return [...data].sort((a, b) => {
        const left = normalize(a[key]);
        const right = normalize(b[key]);
        const result = left.localeCompare(right, "pt-PT", { numeric: true, sensitivity: "base" });
        return result * multiplier;
      });
    }

    function spanLength(data, start, key) {
      const value = data[start][key];
      let count = 1;
      for (let index = start + 1; index < data.length; index += 1) {
        if (data[index][key] !== value) break;
        count += 1;
      }
      return count;
    }

    function canRenderSpan(data, index, key) {
      return index === 0 || data[index - 1][key] !== data[index][key];
    }

    function render() {
      const data = sortedRows(filteredRows());
      tbody.innerHTML = "";

      data.forEach((row, index) => {
        const tr = document.createElement("tr");
        tr.className = `status-${row.status}`;

        if (canRenderSpan(data, index, "group")) {
          tr.insertAdjacentHTML("beforeend", `<td class="group" rowspan="${spanLength(data, index, "group")}">${row.group}</td>`);
        }

        if (canRenderSpan(data, index, "domainSort")) {
          tr.insertAdjacentHTML("beforeend", `<td class="domain" rowspan="${spanLength(data, index, "domainSort")}">${row.domain}</td>`);
        }

        if (canRenderSpan(data, index, "endpoint")) {
          tr.insertAdjacentHTML("beforeend", `<td class="endpoint" rowspan="${spanLength(data, index, "endpoint")}">${row.endpoint}</td>`);
        }

        tr.insertAdjacentHTML("beforeend", `
          <td class="integration">${row.integration}</td>
          <td class="direction">${directionLabel(row.direction)}</td>
          <td class="refs">${row.refs}</td>
          <td>${row.path}</td>
          <td class="resources">${row.resources}</td>
          <td>${row.state}</td>
        `);

        tbody.appendChild(tr);
      });

      rowCount.textContent = `${data.length} de ${rows.length} testes`;
      updateSortIndicators();
    }

    function updateSortIndicators() {
      sortButtons.forEach(button => {
        const indicator = button.querySelector(".sort-indicator");
        const active = button.dataset.sort === sortState.key;
        button.classList.toggle("sorted", active);
        indicator.textContent = active ? (sortState.direction === "asc" ? "▲" : "▼") : "↕";
        button.setAttribute(
          "aria-sort",
          active
            ? (sortState.direction === "asc" ? "ascending" : "descending")
            : "none");
      });
    }

    sortButtons.forEach(button => {
      button.addEventListener("click", () => {
        const key = button.dataset.sort;
        sortState = {
          key,
          direction: sortState.key === key && sortState.direction === "asc" ? "desc" : "asc"
        };
        render();
      });
    });

    [groupFilter, integrationFilter, statusFilter, directionFilter].forEach(control => {
      control.addEventListener("input", render);
      control.addEventListener("change", render);
    });

    populateFilters();
    render();
  </script>
</body>
